<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ultimate Survivor">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Ultimate Survivor</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#060810;overflow:hidden;font-family:'Courier New',monospace;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;env(safe-area-inset-top)}
    canvas{display:block;width:100vw;height:100vh;touch-action:none}

    #levelup{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.78);backdrop-filter:blur(5px);
      z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:24px;
    }
    #levelup.active{display:flex}
    #levelup h2{color:#fff;font-size:2rem;letter-spacing:.3em;text-transform:uppercase;text-shadow:0 0 20px #0af}
    .cards{display:flex;gap:20px}
    .card{
      width:180px;padding:20px 16px;border:1px solid #0af4;border-radius:12px;
      background:rgba(0,160,255,.08);color:#cef;cursor:pointer;transition:all .15s;text-align:center;
    }
    .card:hover,.card:active{background:rgba(0,160,255,.22);border-color:#0af;transform:translateY(-4px);box-shadow:0 0 24px #0af6}
    .card .icon{font-size:2.4rem;margin-bottom:8px}
    .card .name{font-size:.9rem;font-weight:bold;letter-spacing:.1em;margin-bottom:6px}
    .card .desc{font-size:.75rem;color:#89b;line-height:1.4}

    #gameover{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
      z-index:20;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    }
    #gameover.active{display:flex}
    #gameover h1{color:#f44;font-size:3rem;letter-spacing:.3em;text-shadow:0 0 30px #f44}
    #gameover p{color:#aaa;font-size:1rem}
    #gameover button{
      margin-top:12px;padding:12px 36px;background:transparent;border:1px solid #f44;
      color:#f44;font-family:inherit;font-size:1rem;letter-spacing:.2em;cursor:pointer;
      border-radius:6px;transition:all .15s;
    }
    #gameover button:hover{background:#f441;box-shadow:0 0 20px #f444}

    #charselect{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.92);backdrop-filter:blur(6px);
      z-index:30;flex-direction:column;align-items:center;justify-content:center;gap:28px;
    }
    #charselect.active{display:flex}
    #charselect h2{color:#fff;font-size:1.5rem;letter-spacing:.3em;text-transform:uppercase;text-shadow:0 0 18px #0af}
    #charselect .card{width:200px;padding:24px 18px;cursor:pointer}
    #charselect .card .class-icon{font-size:3rem;margin-bottom:10px}
    #charselect .card .stat{font-size:.72rem;color:#7ab;margin-top:3px;line-height:1.6}
    #charselect .card .stat span{color:#cef}

    #go-details{display:flex;gap:24px;margin-top:4px}
    #go-details .go-stat{
      display:flex;flex-direction:column;align-items:center;
      font-size:.85rem;color:#888;
    }
    #go-details .go-stat strong{font-size:1.5rem;color:#ccc;display:block}
    @media (pointer:coarse) {
      .card { width:220px; padding:24px 18px; }
      #charselect .card { width:240px; }
    }
  </style>
</head>
<body>

  <!-- Selezione personaggio -->
  <div id="charselect">
    <h2>SCEGLI IL TUO PERSONAGGIO</h2>
    <div class="cards" id="char-cards"></div>
  </div>

  <div id="levelup">
    <h2 id="overlay-title">⬆ Level Up!</h2>
    <div class="cards" id="cards"></div>
  </div>

  <div id="gameover">
    <h1 id="go-title">GAME OVER</h1>
    <p id="go-stats"></p>
    <div id="go-details"></div>
    <button onclick="showCharSelect()">▶ RIGIOCA</button>
  </div>

  <script src="https://pixijs.download/v8.16.0/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-filters@6.1.5/dist/pixi-filters.js"></script>
  <script src="sprites.js"></script>
  <script src="boss.js"></script>
  <script src="biomes.js"></script>
  <script src="obstacles.js"></script>
  <script src="spatial.js"></script>
  <script src="sound.js"></script>
  <script src="main.js"></script>
</body>
</html>
